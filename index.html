<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna Kholod Ai-kreator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #0d0c0b; --ash: #1a1916; --fog: #272521; --mist: #3a3732; --veil: #9a9690; --parch: #ccc4b8; --cream: #e8e0d4; --gold: #b89a6a; --rose: #8c5f6e; }
    html { scroll-behavior: smooth; }
    body { background: var(--ink); color: var(--cream); font-family: 'Raleway', sans-serif; font-weight: 300; line-height: 1.7; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 3rem; background: rgba(13,12,11,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--mist); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.2em; color: var(--gold); text-decoration: none; }
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a { color: var(--veil); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; }
    .nav-links a:hover { color: var(--cream); }
    #hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 3rem 5rem; background: var(--ink); border-bottom: 1px solid var(--mist); position: relative; }
    .hero-tag { font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.6rem; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 8vw, 8rem); font-weight: 300; line-height: 1.0; color: var(--cream); max-width: 800px; }
    h1 em { font-style: italic; color: var(--rose); }
    .hero-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 3rem; gap: 2rem; flex-wrap: wrap; }
    .hero-desc { max-width: 360px; color: var(--veil); font-size: 0.9rem; line-height: 1.9; }
    .btn { display: inline-block; padding: 0.85rem 2.2rem; font-family: 'Raleway', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; transition: all 0.3s; cursor: pointer; border: none; }
    .btn-gold { background: var(--gold); color: var(--ink); }
    .btn-gold:hover { background: var(--cream); }
    .btn-ghost { background: transparent; color: var(--cream); border: 1px solid var(--mist); }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold); }
    .section-label { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
    h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 4vw, 3.2rem); font-weight: 300; line-height: 1.15; margin-bottom: 2rem; color: var(--cream); }
    h2 em { font-style: italic; color: var(--rose); }
    #about { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--mist); }
    .about-img { background: var(--ash); aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 0.8rem; color: var(--mist); font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; padding: 3rem; border-right: 1px solid var(--mist); }
    .about-content { padding: 5rem 4rem; display: flex; flex-direction: column; justify-content: center; }
    .about-content p { color: var(--parch); font-size: 0.92rem; line-height: 1.95; margin-bottom: 1.2rem; }
    .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.8rem; }
    .tag { font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase; padding: 0.4rem 0.9rem; border: 1px solid var(--mist); color: var(--veil); }
    #video, #gallery, #services, #contact { padding: 6rem 3rem; border-bottom: 1px solid var(--mist); }
    .video-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 3rem; }
    .video-card { background: var(--ash); border: 1px solid var(--mist); overflow: hidden; }
    .video-info { padding: 1.2rem 1.4rem 1.6rem; }
    .video-cat { font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem; }
    .video-title { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--cream); }
    .video-desc { margin-top: 0.5rem; font-size: 0.78rem; color: var(--veil); }
    #contact { background: var(--ash); border-top: 1px solid var(--mist); }
    .contact-inner { max-width: 580px; }
    .contact-email { display: inline-flex; align-items: center; gap: 1rem; color: var(--veil); text-decoration: none; font-size: 0.85rem; padding: 1.2rem 1.6rem; border: 1px solid var(--mist); transition: all 0.3s; margin-bottom: 1rem; }
    .contact-email:hover { color: var(--cream); border-color: var(--gold); }
    footer { border-top: 1px solid var(--mist); padding: 2rem 3rem; display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--mist); }
  </style>
</head>
<body>
  <nav>
    <a href="#hero" class="nav-logo">Anna Kholod Ai-kreator</a>
    <ul class="nav-links">
      <li><a href="#about">O mnie</a></li>
      <li><a href="#contact">Kontakt</a></li>
    </ul>
  </nav>

  <section id="hero">
    <p class="hero-tag">Ai-kreator · Polska</p>
    <h1>Tworzę treści,<br>które <em>działają</em></h1>
    <div class="hero-row">
      <p class="hero-desc">Wideo, ilustracje, muzyka i identyfikacja wizualna.</p>
      <div class="hero-cta"><a href="#contact" class="btn btn-gold">Kontakt</a></div>
    </div>
  </section>

  <section id="contact">
    <div class="contact-inner">
      <p class="section-label">Kontakt</p>
      <h2>Porozmawiajmy o <em>projekcie</em></h2>
      <div class="contact-links" style="display:flex; flex-direction:column; gap:1rem;">
        <a href="mailto:annakholodcreating@gmail.com" class="contact-email">✉ annakholodcreating@gmail.com</a>
        <a href="https://wa.me/48517711772" target="_blank" class="contact-email">✆ WhatsApp: +48 517 711 772</a>
      </div>
    </div>
  </section>

  <footer>
    <span>© 2026 Anna Kholod Ai-kreator</span>
  </footer>
</body>
</html>
