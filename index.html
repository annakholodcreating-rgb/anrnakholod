<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anna Kholod Ai-kreator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --ink: #0d0c0b; --ash: #1a1916; --fog: #272521; --mist: #3a3732; --veil: #9a9690; --parch: #ccc4b8; --cream: #e8e0d4; --gold: #b89a6a; --rose: #8c5f6e; }
    html { scroll-behavior: smooth; }
    body { background: var(--ink); color: var(--cream); font-family: 'Raleway', sans-serif; font-weight: 300; line-height: 1.7; overflow-x: hidden; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 1.4rem 3rem; background: rgba(13,12,11,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--mist); }
    .nav-logo { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; letter-spacing: 0.2em; color: var(--gold); text-decoration: none; }
    .nav-links { display: flex; gap: 2.4rem; list-style: none; }
    .nav-links a { color: var(--veil); text-decoration: none; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; transition: color 0.3s; }
    .nav-links a:hover { color: var(--cream); }
    #hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 3rem 5rem; background: var(--ink); border-bottom: 1px solid var(--mist); position: relative; }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 8vw, 8rem); font-weight: 300; line-height: 1.0; letter-spacing: 0.02em; color: var(--cream); margin-bottom: 2rem; }
    h1 em { font-style: italic; color: var(--rose); }
    .btn { display: inline-block; padding: 0.85rem 2.2rem; font-family: 'Raleway', sans-serif; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; text-decoration: none; cursor: pointer; border: none; }
    .btn-gold { background: var(--gold); color: var(--ink); }
    .section-label { font-size: 0.65rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 1.2rem; }
    .gallery-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 0.8rem; margin-top: 3rem; }
    .gallery-item { border: 1px solid var(--mist); overflow: hidden; position: relative; }
    .gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .contact-email { display: inline-flex; align-items: center; gap: 1rem; color: var(--veil); text-decoration: none; font-size: 0.85rem; padding: 1.2rem 1.6rem; border: 1px solid var(--mist); margin-bottom: 1rem; }
  </style>
</head>
<body>

  <nav>
    <a href="#hero" class="nav-logo">Anna Kholod Ai-kreator</a>
    <ul class="nav-links">
      <li><a href="#contact">Kontakt</a></li>
    </ul>
  </nav>

  <section id="hero">
    <h1>Tworzę treści,<br>które <em>działają</em></h1>
    <a href="#gallery" class="btn btn-gold">Zobacz prace</a>
  </section>

  <section id="gallery">
    <p class="section-label">Galeria</p>
    <div class="gallery-grid">
      <div class="gallery-item" style="grid-column: span 7;"><img src="images/IMG_0302.png" alt="Obraz"></div>
      <div class="gallery-item" style="grid-column: span 5;"><img src="images/IMG_0303.png" alt="Obraz"></div>
      <div class="gallery-item" style="grid-column: span 4;"><img src="images/IMG_0304.png" alt="Obraz"></div>
      <div class="gallery-item" style="grid-column: span 4;"><img src="images/IMG_0306.png" alt="Obraz"></div>
      <div class="gallery-item" style="grid-column: span 4;"><img src="images/IMG_0305.png" alt="Obraz"></div>
    </div>
  </section>

  <section id="contact">
    <p class="section-label">Kontakt</p>
    <h2>Porozmawiajmy o <em>projekcie</em></h2>
    <div class="contact-links" style="display:flex; flex-direction:column; width:fit-content;">
      <a href="mailto:annakholodcreating@gmail.com" class="contact-email">✉ annakholodcreating@gmail.com</a>
      <a href="https://wa.me/48517711772" target="_blank" class="contact-email">✆ WhatsApp: +48 517 711 772</a>
    </div>
  </section>

  <footer>
    <span style="display:block; padding:2rem 3rem; font-size:0.7rem; color:var(--mist);">© 2026 Anna Kholod Ai-kreator</span>
  </footer>

</body>
</html>
